<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 3 Privacy & Freedom (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .option { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgb(0 0 0 / 0.1); }
        .option:disabled { cursor: not-allowed; }
        .progress-bar { transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .quiz-container { animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 640px) {
            .option { padding: 1.25rem 1rem; font-size: 1rem; }
            h2 { font-size: 1.35rem; line-height: 1.3; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-violet-600 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full mx-auto">
        <div class="flex items-center justify-between mb-8 text-white">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-white/20 backdrop-blur-xl rounded-3xl flex items-center justify-center text-4xl shadow-inner">🔒</div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tighter">Quizzy Pro</h1>
                    <p class="text-white/70 text-sm -mt-1">Unit 3 • Privacy and Freedom of Expression • 30 MCQs</p>
                </div>
            </div>
            <button onclick="restartQuiz()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2 transition-all active:scale-95">🔄 Restart</button>
        </div>

        <div id="quiz-card" class="quiz-container bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="h-2 bg-gray-100">
                <div id="progress" class="progress-bar h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-violet-500 w-1/30"></div>
            </div>
            <div class="p-6 sm:p-8">
                <div class="flex justify-between items-center mb-6">
                    <div id="question-counter" class="text-sm font-semibold text-gray-500">Question 1 of 30</div>
                    <div class="text-xs font-mono bg-amber-100 text-amber-700 px-5 py-1.5 rounded-3xl flex items-center gap-1"><span>📌</span><span id="status">Unanswered</span></div>
                </div>
                <h2 id="question-text" class="text-xl sm:text-2xl font-semibold text-gray-900 leading-tight mb-10 min-h-[88px]"></h2>
                <div id="options" class="space-y-3 sm:space-y-4 mb-10"></div>
                <div class="flex items-center justify-between">
                    <button onclick="previousQuestion()" id="prev-btn" class="px-6 sm:px-8 py-3.5 text-sm font-medium text-gray-500 hover:text-gray-700 flex items-center gap-2 disabled:opacity-40 transition-all">← Previous</button>
                    <button onclick="nextQuestion()" id="next-btn" class="px-8 sm:px-12 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-3xl flex items-center gap-3 shadow-xl shadow-indigo-500/40 hover:shadow-2xl transition-all"><span id="next-text">Next Question</span><span class="text-2xl">→</span></button>
                </div>
            </div>
        </div>

        <div id="results-screen" class="hidden bg-white rounded-3xl shadow-2xl p-8 sm:p-10">
            <div class="text-center mb-10">
                <div id="trophy" class="text-7xl sm:text-8xl mb-4 transition-all">🔒</div>
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-900">Quiz Complete!</h2>
                <p class="text-gray-500 mt-2">Data Analyst Performance Report</p>
            </div>
            <div class="bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-3xl p-8 mb-8">
                <div class="flex justify-center items-center gap-10 sm:gap-12">
                    <div class="text-center"><div id="score" class="text-6xl sm:text-7xl font-bold text-gray-900">24/30</div><div class="text-xs text-gray-400 mt-1 tracking-widest">YOUR SCORE</div></div>
                    <div class="h-20 w-px bg-gray-200"></div>
                    <div class="text-center"><div id="percentage" class="text-6xl sm:text-7xl font-bold text-indigo-600">80%</div><div class="text-xs text-gray-400 mt-1 tracking-widest">OVERALL ACCURACY</div></div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-emerald-50 rounded-3xl p-6 text-center border border-emerald-100"><div id="correct-count" class="text-4xl sm:text-5xl font-bold text-emerald-600">24</div><div class="text-xs font-semibold text-emerald-700 mt-3 tracking-widest">CORRECT</div></div>
                <div class="bg-rose-50 rounded-3xl p-6 text-center border border-rose-100"><div id="incorrect-count" class="text-4xl sm:text-5xl font-bold text-rose-600">3</div><div class="text-xs font-semibold text-rose-700 mt-3 tracking-widest">INCORRECT</div></div>
                <div class="bg-zinc-50 rounded-3xl p-6 text-center border border-zinc-100"><div id="skipped-count" class="text-4xl sm:text-5xl font-bold text-zinc-600">3</div><div class="text-xs font-semibold text-zinc-700 mt-3 tracking-widest">SKIPPED</div></div>
            </div>
            <div id="insights" class="bg-indigo-50 border border-indigo-100 rounded-3xl p-6 sm:p-7 text-sm leading-relaxed text-indigo-950"></div>
            <div class="flex flex-col sm:flex-row gap-4 mt-10">
                <button onclick="restartQuiz()" class="flex-1 bg-gray-900 hover:bg-black text-white font-semibold py-5 rounded-3xl transition-all active:scale-[0.97]">Play Again</button>
                <button onclick="shareResults()" class="flex-1 border-2 border-indigo-200 hover:border-indigo-400 font-semibold py-5 rounded-3xl transition-all">Share My Report 📤</button>
            </div>
            <div onclick="showAnswers()" class="mt-6 text-center text-indigo-600 hover:text-indigo-700 cursor-pointer font-medium flex items-center justify-center gap-2">Review All Answers ↓</div>
        </div>

        <div id="review-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[92vh] flex flex-col">
                <div class="p-6 border-b flex items-center justify-between bg-white sticky top-0 z-10 rounded-t-3xl">
                    <h3 class="font-semibold text-xl">Detailed Review • Unit 3 (30 Questions)</h3>
                    <button onclick="hideReview()" class="w-10 h-10 flex items-center justify-center text-4xl leading-none text-gray-400 hover:text-gray-600 transition-colors">×</button>
                </div>
                <div id="review-content" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            { question: "What does Information Privacy refer to?", options: ["Only physical body privacy", "The right of individuals to control how their personal information is collected, used, disclosed, and stored", "Only government secrets", "Only bank account details"], answer: 1 },
            { question: "Which article of the Constitution of Nepal guarantees the Right to Privacy?", options: ["Article 17", "Article 28", "Article 19", "Article 12"], answer: 1 },
            { question: "The primary legislation that gives effect to the constitutional right to privacy in Nepal is:", options: ["Electronic Transactions Act 2063", "The Privacy Act, 2075 (2018)", "Consumer Protection Act only", "Muluki Criminal Code only"], answer: 1 },
            { question: "Which of the following is listed as 'Personal Information' under the Privacy Act 2075?", options: ["Only fingerprints", "Full name, address, phone number, email address", "Only bank balance", "Only political opinions"], answer: 1 },
            { question: "Which of the following is classified as 'Sensitive Information' under Nepali law?", options: ["Phone number only", "Caste, ethnicity, religion, political affiliation", "Only email address", "Only educational qualification"], answer: 1 },
            { question: "Before collecting personal data, data handlers must obtain:", options: ["No consent", "Explicit, informed consent", "Only verbal consent", "Only company approval"], answer: 1 },
            { question: "Under the Privacy Act 2075, data can only be used for:", options: ["Any purpose the company wants", "The specific purpose for which it was collected (Purpose Limitation)", "Only marketing", "Only government use"], answer: 1 },
            { question: "Violation of the Privacy Act 2075 is punishable with:", options: ["Only warning", "Imprisonment up to 3 years or fine up to NPR 30,000 or both", "Only NPR 5,000 fine", "No penalty"], answer: 1 },
            { question: "A complaint under the Privacy Act must be filed within:", options: ["6 months", "3 months from the date of violation", "1 year", "No time limit"], answer: 1 },
            { question: "In the Supreme Court case N.K.P. 2074 Decision 9740, the Court ruled that government cannot:", options: ["Arbitrarily access call details without proper legal authority", "Ever investigate crimes", "Use any technology", "Collect any data"], answer: 0 },
            { question: "One major issue of concern in Nepali Privacy Law is:", options: ["Too broad definition of personal data", "Narrow definition that does not cover IP addresses, cookies, location data", "No penalties at all", "Only government data is protected"], answer: 1 },
            { question: "Consumer Profiling is mainly used for:", options: ["Only deleting accounts", "Targeted advertising and personalized recommendations", "Only security checks", "Only government surveillance"], answer: 1 },
            { question: "Electronic Discovery (e-Discovery) refers to:", options: ["Finding lost phones", "Producing electronically stored information as evidence in legal proceedings", "Only email sending", "Only social media posts"], answer: 1 },
            { question: "Workplace Monitoring includes:", options: ["Only CCTV in public areas", "Monitoring emails, internet usage, keystrokes and GPS on company devices", "Only annual reviews", "Only salary checks"], answer: 1 },
            { question: "Surveillance by government must be:", options: ["Unlimited", "Authorized by law, necessary and proportionate", "Only for entertainment", "Only on social media"], answer: 1 },
            { question: "Freedom of opinion and expression in Nepal is guaranteed under:", options: ["Article 28", "Article 17(2)(a)", "Article 12 only", "Article 19 only"], answer: 1 },
            { question: "Freedom of Expression in Nepal is:", options: ["Absolute with no restrictions", "Not absolute — reasonable restrictions can be imposed by law", "Only for media houses", "Only for government officials"], answer: 1 },
            { question: "One key issue related to Freedom of Expression in Nepal is:", options: ["No hate speech problem", "Spread of hate speech and misinformation often linked to caste, ethnicity or religion", "Only foreign content", "Only entertainment posts"], answer: 1 },
            { question: "The 2025 Social Media Ban (blocking 26 platforms) was criticized because it:", options: ["Improved national security only", "Restricted citizens' primary means of communication and expression", "Helped only businesses", "Was supported by everyone"], answer: 1 },
            { question: "The 'Chilling Effect' in freedom of expression refers to:", options: ["People speaking more freely", "People self-censoring out of fear of prosecution due to vague laws", "Only cold weather effect", "Only social media likes"], answer: 1 },
            { question: "Privacy in a Public Sphere on social media means:", options: ["Users have full legal privacy even on public posts", "Users often have a false sense of privacy when sharing publicly", "Only private accounts are safe", "Government cannot see anything"], answer: 1 },
            { question: "According to INSEC 2023 report mentioned in the unit, how many girls and women fell victim to social media crimes?", options: ["Only 10", "88 girls and 131 women", "Only men", "No cases reported"], answer: 1 },
            { question: "Filter Bubbles and Echo Chambers are caused by:", options: ["Manual selection only", "Algorithms showing users content they agree with, reinforcing existing beliefs", "Only news channels", "Only government control"], answer: 1 },
            { question: "One major ethical concern with social media platforms is:", options: ["They reduce anxiety", "Design that encourages addictive behavior and mental health issues", "They never collect data", "They only help education"], answer: 1 },
            { question: "Data Mining and Manipulation on social media can be used for:", options: ["Only good advertising", "Political micro-targeting and election manipulation", "Only deleting accounts", "Only entertainment"], answer: 1 },
            { question: "Anonymity on social media:", options: ["Always protects everyone perfectly", "Can protect activists but also emboldens trolls and harassers", "Is never used", "Only for celebrities"], answer: 1 },
            { question: "Digital Divide in the context of social networking means:", options: ["Everyone has equal access", "Some people are excluded due to lack of access and digital literacy", "Only rich people use social media", "Only urban areas are affected"], answer: 1 },
            { question: "The Social Media Bill 2081 (2025) was:", options: ["Passed permanently", "Withdrawn in February 2026 after widespread protests", "Supported by all parties", "Only for entertainment"], answer: 1 },
            { question: "Publishing information about a public figure is not an offence under Privacy Act if it:", options: ["Is for personal gain only", "Serves public interest or transparency", "Is always illegal", "Only about celebrities"], answer: 1 },
            { question: "The Privacy Act 2075 does NOT explicitly cover modern digital identifiers like:", options: ["Full name", "IP addresses, cookies, location data", "Caste only", "Religion only"], answer: 1 }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let selectedAnswers = [];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            questions = originalQuestions.map(q => {
                const shuffledOptions = shuffleArray(q.options);
                const originalCorrect = q.options[q.answer];
                const newAnswerIndex = shuffledOptions.indexOf(originalCorrect);
                return { question: q.question, options: shuffledOptions, answer: newAnswerIndex };
            });
            selectedAnswers = new Array(questions.length).fill(null);
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('progress').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-counter').textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            document.getElementById('question-text').textContent = q.question;
            renderOptions();
            updateNavigationButtons();
        }

        function renderOptions() {
            const container = document.getElementById('options');
            container.innerHTML = '';
            const q = questions[currentQuestionIndex];
            const selected = selectedAnswers[currentQuestionIndex];
            const isLocked = selected !== null;
            const correctIdx = q.answer;

            q.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                let btnClass = `option w-full text-left px-6 py-5 sm:py-6 rounded-3xl border-2 text-base sm:text-lg font-medium flex items-center gap-5 group`;
                let extraHTML = '';

                if (isLocked) {
                    btn.disabled = true;
                    if (idx === correctIdx) {
                        btnClass += ' border-emerald-400 bg-emerald-50 text-emerald-900';
                        extraHTML = `<span class="ml-auto text-3xl text-emerald-500">✓</span>`;
                    } else if (idx === selected) {
                        btnClass += ' border-rose-400 bg-rose-50 text-rose-900';
                        extraHTML = `<span class="ml-auto text-3xl text-rose-500">✕</span>`;
                    } else {
                        btnClass += ' border-gray-200 bg-white/70 opacity-80';
                    }
                } else {
                    btnClass += ' border-gray-200 hover:border-indigo-300 hover:bg-indigo-50';
                    if (idx === selected) btnClass += ' border-indigo-400 bg-indigo-50';
                }

                btn.className = btnClass;
                btn.innerHTML = `
                    <span class="w-9 h-9 flex-shrink-0 rounded-2xl border flex items-center justify-center text-base font-bold">${String.fromCharCode(65 + idx)}</span>
                    <span class="flex-1">${option}</span>
                    ${extraHTML}
                `;
                if (!isLocked) btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            const statusEl = document.getElementById('status');
            statusEl.textContent = isLocked ? 'Answered' : 'Unanswered';
            statusEl.parentElement.classList.toggle('bg-emerald-100', isLocked);
            statusEl.parentElement.classList.toggle('text-emerald-700', isLocked);
        }

        function selectOption(index) {
            if (selectedAnswers[currentQuestionIndex] !== null) return;
            selectedAnswers[currentQuestionIndex] = index;
            renderOptions();
            updateNavigationButtons();
        }

        function updateNavigationButtons() {
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerHTML = currentQuestionIndex === questions.length - 1 
                ? `Finish Quiz <span class="text-2xl">🏁</span>` 
                : `Next Question <span class="text-2xl">→</span>`;
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            selectedAnswers.forEach((selected, i) => {
                if (selected === null) skipped++;
                else if (selected === questions[i].answer) correct++;
                else incorrect++;
            });
            return { correct, incorrect, skipped, total: questions.length };
        }

        function showResults() {
            const { correct, incorrect, skipped, total } = calculateResults();
            const percentage = Math.round((correct / total) * 100);
            const attempted = correct + incorrect;
            const accuracyAttempted = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;

            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            document.getElementById('score').textContent = `${correct}/${total}`;
            document.getElementById('percentage').textContent = `${percentage}%`;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('skipped-count').textContent = skipped;

            const trophyEl = document.getElementById('trophy');
            trophyEl.textContent = percentage >= 85 ? '🏆' : percentage >= 65 ? '🔥' : percentage >= 40 ? '👍' : '📚';

            let insightsHTML = `You scored <strong>${correct}</strong> out of <strong>${total}</strong> (${percentage}% overall).<br><br>${attempted > 0 ? `Accuracy on attempted questions: <strong>${accuracyAttempted}%</strong>.<br><br>` : ''}${skipped > 0 ? `💡 You skipped <strong>${skipped}</strong> questions. Attempting them could have boosted your score significantly!` : `🌟 Outstanding! You attempted every question.`}`;
            document.getElementById('insights').innerHTML = insightsHTML;
        }

        function restartQuiz() {
            prepareShuffledQuestions();
            currentQuestionIndex = 0;
            document.getElementById('quiz-card').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('review-modal').classList.add('hidden');
            renderQuestion();
        }

        function shareResults() {
            const { correct, incorrect, skipped, total } = calculateResults();
            const percentage = Math.round((correct / total) * 100);
            const text = `🔒 Quizzy Pro Result (Unit 3 Privacy & Freedom of Expression)\nI scored ${correct}/${total} (${percentage}%) — ${correct} correct, ${incorrect} wrong, ${skipped} skipped!\n\nBeat my score? Download the HTML file and play instantly!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const orig = btn.textContent;
                btn.textContent = '✅ Report Copied!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }

        function showAnswers() {
            const modal = document.getElementById('review-modal');
            const content = document.getElementById('review-content');
            content.innerHTML = '';
            questions.forEach((q, i) => {
                const selected = selectedAnswers[i];
                const isCorrect = selected === q.answer;
                let statusHTML = '';
                if (selected === null) {
                    statusHTML = `<div class="flex items-center gap-3 text-amber-600"><span class="text-3xl">⏭️</span><span class="font-semibold">Skipped</span></div>`;
                } else if (isCorrect) {
                    statusHTML = `<div class="flex items-center gap-3 text-emerald-600"><span class="text-3xl">✅</span><span class="font-semibold">Correct</span></div>`;
                } else {
                    statusHTML = `<div class="flex items-center gap-3 text-rose-600"><span class="text-3xl">❌</span><span class="font-semibold">Incorrect</span></div>`;
                }
                const div = document.createElement('div');
                div.className = `border rounded-3xl p-7 ${selected === null ? 'border-amber-200 bg-amber-50' : isCorrect ? 'border-emerald-200 bg-emerald-50' : 'border-rose-200 bg-rose-50'}`;
                div.innerHTML = `${statusHTML}<p class="font-medium mt-5 text-lg leading-tight">${q.question}</p><div class="grid grid-cols-1 gap-3 mt-7">${q.options.map((opt, idx) => { let optClass = 'px-6 py-4 rounded-2xl border text-base flex justify-between items-center'; if (idx === q.answer) optClass += ' border-emerald-400 bg-emerald-100 text-emerald-800'; else if (selected !== null && idx === selected) optClass += ' border-rose-400 bg-rose-100 text-rose-800 line-through'; else optClass += ' border-gray-200 bg-white'; return `<div class="${optClass}"><span>${String.fromCharCode(65 + idx)}. ${opt}</span>${idx === q.answer ? '<span class="text-emerald-600 text-xl">✓</span>' : ''}</div>`; }).join('')}</div>`;
                content.appendChild(div);
            });
            modal.classList.remove('hidden');
        }

        function hideReview() {
            document.getElementById('review-modal').classList.add('hidden');
        }

        function handleKeyboard(e) {
            if (document.getElementById('quiz-card').classList.contains('hidden')) return;
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft') previousQuestion();
            if (e.key >= '1' && e.key <= '4') {
                const idx = parseInt(e.key) - 1;
                if (idx < questions[currentQuestionIndex].options.length && selectedAnswers[currentQuestionIndex] === null) {
                    selectOption(idx);
                }
            }
        }

        function prepareShuffledQuestions() {
            questions = originalQuestions.map(q => {
                const shuffledOptions = shuffleArray(q.options);
                const originalCorrect = q.options[q.answer];
                const newAnswerIndex = shuffledOptions.indexOf(originalCorrect);
                return { question: q.question, options: shuffledOptions, answer: newAnswerIndex };
            });
            selectedAnswers = new Array(questions.length).fill(null);
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            prepareShuffledQuestions();
            currentQuestionIndex = 0;
            renderQuestion();
            document.addEventListener('keydown', handleKeyboard);
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
