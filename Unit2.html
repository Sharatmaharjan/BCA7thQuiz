<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 2 Cybersecurity (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .option { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgb(0 0 0 / 0.1); }
        .option:disabled { cursor: not-allowed; }
        .progress-bar { transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .quiz-container { animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 640px) {
            .option { padding: 1.25rem 1rem; font-size: 1rem; }
            h2 { font-size: 1.35rem; line-height: 1.3; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-red-600 via-orange-600 to-rose-600 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full mx-auto">
        <div class="flex items-center justify-between mb-8 text-white">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-white/20 backdrop-blur-xl rounded-3xl flex items-center justify-center text-4xl shadow-inner">🛡️</div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tighter">Quizzy Pro</h1>
                    <p class="text-white/70 text-sm -mt-1">Unit 2 • Cyberattacks, Cybersecurity & Cyber Law • 30 MCQs</p>
                </div>
            </div>
            <button onclick="restartQuiz()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2 transition-all active:scale-95">🔄 Restart</button>
        </div>

        <div id="quiz-card" class="quiz-container bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="h-2 bg-gray-100">
                <div id="progress" class="progress-bar h-full bg-gradient-to-r from-red-500 via-orange-500 to-rose-500 w-1/30"></div>
            </div>
            <div class="p-6 sm:p-8">
                <div class="flex justify-between items-center mb-6">
                    <div id="question-counter" class="text-sm font-semibold text-gray-500">Question 1 of 30</div>
                    <div class="text-xs font-mono bg-amber-100 text-amber-700 px-5 py-1.5 rounded-3xl flex items-center gap-1"><span>📌</span><span id="status">Unanswered</span></div>
                </div>
                <h2 id="question-text" class="text-xl sm:text-2xl font-semibold text-gray-900 leading-tight mb-10 min-h-[88px]"></h2>
                <div id="options" class="space-y-3 sm:space-y-4 mb-10"></div>
                <div class="flex items-center justify-between">
                    <button onclick="previousQuestion()" id="prev-btn" class="px-6 sm:px-8 py-3.5 text-sm font-medium text-gray-500 hover:text-gray-700 flex items-center gap-2 disabled:opacity-40 transition-all">← Previous</button>
                    <button onclick="nextQuestion()" id="next-btn" class="px-8 sm:px-12 py-4 bg-gradient-to-r from-red-600 to-orange-600 text-white font-semibold rounded-3xl flex items-center gap-3 shadow-xl shadow-red-500/40 hover:shadow-2xl transition-all"><span id="next-text">Next Question</span><span class="text-2xl">→</span></button>
                </div>
            </div>
        </div>

        <div id="results-screen" class="hidden bg-white rounded-3xl shadow-2xl p-8 sm:p-10">
            <div class="text-center mb-10">
                <div id="trophy" class="text-7xl sm:text-8xl mb-4 transition-all">🛡️</div>
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-900">Quiz Complete!</h2>
                <p class="text-gray-500 mt-2">Data Analyst Performance Report</p>
            </div>
            <div class="bg-gradient-to-br from-gray-50 to-white border border-gray-100 rounded-3xl p-8 mb-8">
                <div class="flex justify-center items-center gap-10 sm:gap-12">
                    <div class="text-center"><div id="score" class="text-6xl sm:text-7xl font-bold text-gray-900">24/30</div><div class="text-xs text-gray-400 mt-1 tracking-widest">YOUR SCORE</div></div>
                    <div class="h-20 w-px bg-gray-200"></div>
                    <div class="text-center"><div id="percentage" class="text-6xl sm:text-7xl font-bold text-red-600">80%</div><div class="text-xs text-gray-400 mt-1 tracking-widest">OVERALL ACCURACY</div></div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-emerald-50 rounded-3xl p-6 text-center border border-emerald-100"><div id="correct-count" class="text-4xl sm:text-5xl font-bold text-emerald-600">24</div><div class="text-xs font-semibold text-emerald-700 mt-3 tracking-widest">CORRECT</div></div>
                <div class="bg-rose-50 rounded-3xl p-6 text-center border border-rose-100"><div id="incorrect-count" class="text-4xl sm:text-5xl font-bold text-rose-600">3</div><div class="text-xs font-semibold text-rose-700 mt-3 tracking-widest">INCORRECT</div></div>
                <div class="bg-zinc-50 rounded-3xl p-6 text-center border border-zinc-100"><div id="skipped-count" class="text-4xl sm:text-5xl font-bold text-zinc-600">3</div><div class="text-xs font-semibold text-zinc-700 mt-3 tracking-widest">SKIPPED</div></div>
            </div>
            <div id="insights" class="bg-red-50 border border-red-100 rounded-3xl p-6 sm:p-7 text-sm leading-relaxed text-red-950"></div>
            <div class="flex flex-col sm:flex-row gap-4 mt-10">
                <button onclick="restartQuiz()" class="flex-1 bg-gray-900 hover:bg-black text-white font-semibold py-5 rounded-3xl transition-all active:scale-[0.97]">Play Again</button>
                <button onclick="shareResults()" class="flex-1 border-2 border-red-200 hover:border-red-400 font-semibold py-5 rounded-3xl transition-all">Share My Report 📤</button>
            </div>
            <div onclick="showAnswers()" class="mt-6 text-center text-red-600 hover:text-red-700 cursor-pointer font-medium flex items-center justify-center gap-2">Review All Answers ↓</div>
        </div>

        <div id="review-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[92vh] flex flex-col">
                <div class="p-6 border-b flex items-center justify-between bg-white sticky top-0 z-10 rounded-t-3xl">
                    <h3 class="font-semibold text-xl">Detailed Review • Unit 2 (30 Questions)</h3>
                    <button onclick="hideReview()" class="w-10 h-10 flex items-center justify-center text-4xl leading-none text-gray-400 hover:text-gray-600 transition-colors">×</button>
                </div>
                <div id="review-content" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            { question: "What is the difference between a Computer Incident and a Cyberattack?", options: ["They are the same thing", "A cyberattack is always malicious and intentional while a computer incident is any adverse event", "A computer incident is always intentional", "Cyberattacks are never incidents"], answer: 1 },
            { question: "Drive-by Exploits primarily target:", options: ["Email attachments", "Legitimate websites by injecting malicious code that runs automatically", "USB drives only", "Physical servers"], answer: 1 },
            { question: "Which malware type spreads across networks without any human interaction?", options: ["Trojan", "Worm", "Ransomware", "Phishing"], answer: 1 },
            { question: "SQL Injection (SQLi) is an example of:", options: ["Phishing attack", "Code Injection Attack", "Denial of Service", "Privilege Escalation"], answer: 1 },
            { question: "A DDoS attack mainly violates which part of the CIA Triad?", options: ["Confidentiality", "Integrity", "Availability", "All three equally"], answer: 2 },
            { question: "Ransomware is a type of malware that:", options: ["Only steals data", "Encrypts files and demands ransom", "Only spreads via email", "Only deletes files"], answer: 1 },
            { question: "Who among the following is motivated by financial gain?", options: ["Nation-States", "Hacktivists", "Cybercriminals", "Terrorists"], answer: 2 },
            { question: "The CIA Security Triad stands for:", options: ["Confidentiality, Integrity, Availability", "Control, Identity, Authentication", "Cybersecurity, Investigation, Analysis", "Compliance, Integrity, Accountability"], answer: 0 },
            { question: "Which of the following is the best way to protect Confidentiality?", options: ["Regular backups", "Encryption and strong access controls", "Load balancers", "Version control"], answer: 1 },
            { question: "Hashing (e.g., SHA-256) is primarily used to ensure:", options: ["Confidentiality", "Integrity", "Availability", "Only speed"], answer: 1 },
            { question: "Redundancy, Failover Clusters and Disaster Recovery Plans are used to maintain:", options: ["Confidentiality", "Integrity", "Availability", "All three"], answer: 2 },
            { question: "At the Organizational Level, role-based access control (RBAC) primarily supports:", options: ["Availability", "Confidentiality", "Only Integrity", "Only Availability"], answer: 1 },
            { question: "At the Network Level, TLS/SSL and VPNs are used for:", options: ["Integrity only", "Confidentiality of data in transit", "Only Availability", "Only Authentication"], answer: 1 },
            { question: "Input validation on both client and server sides is a key control at which level?", options: ["Organizational", "Network", "Application", "End-User"], answer: 2 },
            { question: "Educating users about phishing and enforcing MFA is most important at:", options: ["Application Level", "End-User Level", "Network Level", "Organizational Level only"], answer: 1 },
            { question: "The first phase of Incident Response is:", options: ["Eradication", "Incident Notification & Detection", "Containment", "Recovery"], answer: 1 },
            { question: "Creating forensic images and maintaining chain of custody happens in which phase?", options: ["Containment", "Protection of Evidence and Activity Logs", "Eradication", "Follow-Up"], answer: 1 },
            { question: "Short-term containment usually involves:", options: ["Rebuilding the entire system", "Isolating the affected system and blocking attacker IP", "Paying ransom", "Deleting logs"], answer: 1 },
            { question: "In the Eradication phase, you should:", options: ["Leave the malware for investigation", "Remove malware, patch vulnerabilities and rebuild from clean backup", "Only change passwords", "Ignore the root cause"], answer: 1 },
            { question: "The final phase that includes Lessons Learned and updating policies is called:", options: ["Containment", "Incident Follow-Up (Recovery & Lessons Learned)", "Detection", "Protection of Evidence"], answer: 1 },
            { question: "An MSSP stands for:", options: ["Managed Security Service Provider", "Main Security Software Program", "Manual System Security Protocol", "Master Security Service Provider"], answer: 0 },
            { question: "One major advantage of using an MSSP is:", options: ["Complete loss of control", "24/7 Coverage and access to expert skills", "Higher cost than in-house SOC", "No threat intelligence"], answer: 1 },
            { question: "A disadvantage of MSSP is:", options: ["Loss of Control and potential data privacy concerns", "It is always cheaper", "No 24/7 monitoring", "No expertise"], answer: 0 },
            { question: "The primary goal of Computer Forensics is:", options: ["Only to delete evidence", "To identify, preserve, analyze and present digital evidence legally", "Only to recover deleted files", "To ignore legal requirements"], answer: 1 },
            { question: "Chain of custody is critical in which forensics step?", options: ["Only Presentation", "Preservation", "Only Analysis", "Only Identification"], answer: 1 },
            { question: "Cyber Law in general covers:", options: ["Only hardware sales", "Cybercrimes, E-Commerce, Intellectual Property and Data Privacy", "Only passwords", "Only physical security"], answer: 1 },
            { question: "The cornerstone of cyber law in Nepal is:", options: ["Only the Privacy Act", "Electronic Transactions Act (ETA) 2063", "Only Cyber Security Bye-Law", "Only proposed 2080 bill"], answer: 1 },
            { question: "Under ETA 2063, punishment for Unauthorized Access (Hacking) can be:", options: ["Only fine of NPR 10,000", "Imprisonment up to 3 years and/or fine up to NPR 200,000", "Only warning", "Only community service"], answer: 1 },
            { question: "Publication of obscene material in electronic form carries punishment of:", options: ["Up to 1 year imprisonment", "Imprisonment up to 5 years and/or fine up to NPR 100,000", "Only NPR 5,000 fine", "No punishment"], answer: 1 },
            { question: "Which recent law in Nepal mandates Security Operation Centers for telecom providers?", options: ["Electronic Transactions Act 2063", "Cyber Security Bye-Law 2077 (2020)", "Individual Privacy Act 2018 only", "None"], answer: 1 }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let selectedAnswers = [];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            questions = originalQuestions.map(q => {
                const shuffledOptions = shuffleArray(q.options);
                const originalCorrect = q.options[q.answer];
                const newAnswerIndex = shuffledOptions.indexOf(originalCorrect);
                return { question: q.question, options: shuffledOptions, answer: newAnswerIndex };
            });
            selectedAnswers = new Array(questions.length).fill(null);
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('progress').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-counter').textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            document.getElementById('question-text').textContent = q.question;
            renderOptions();
            updateNavigationButtons();
        }

        function renderOptions() {
            const container = document.getElementById('options');
            container.innerHTML = '';
            const q = questions[currentQuestionIndex];
            const selected = selectedAnswers[currentQuestionIndex];
            const isLocked = selected !== null;
            const correctIdx = q.answer;

            q.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                let btnClass = `option w-full text-left px-6 py-5 sm:py-6 rounded-3xl border-2 text-base sm:text-lg font-medium flex items-center gap-5 group`;
                let extraHTML = '';

                if (isLocked) {
                    btn.disabled = true;
                    if (idx === correctIdx) {
                        btnClass += ' border-emerald-400 bg-emerald-50 text-emerald-900';
                        extraHTML = `<span class="ml-auto text-3xl text-emerald-500">✓</span>`;
                    } else if (idx === selected) {
                        btnClass += ' border-rose-400 bg-rose-50 text-rose-900';
                        extraHTML = `<span class="ml-auto text-3xl text-rose-500">✕</span>`;
                    } else {
                        btnClass += ' border-gray-200 bg-white/70 opacity-80';
                    }
                } else {
                    btnClass += ' border-gray-200 hover:border-red-300 hover:bg-red-50';
                    if (idx === selected) btnClass += ' border-red-400 bg-red-50';
                }

                btn.className = btnClass;
                btn.innerHTML = `
                    <span class="w-9 h-9 flex-shrink-0 rounded-2xl border flex items-center justify-center text-base font-bold">${String.fromCharCode(65 + idx)}</span>
                    <span class="flex-1">${option}</span>
                    ${extraHTML}
                `;
                if (!isLocked) btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            const statusEl = document.getElementById('status');
            statusEl.textContent = isLocked ? 'Answered' : 'Unanswered';
            statusEl.parentElement.classList.toggle('bg-emerald-100', isLocked);
            statusEl.parentElement.classList.toggle('text-emerald-700', isLocked);
        }

        function selectOption(index) {
            if (selectedAnswers[currentQuestionIndex] !== null) return;
            selectedAnswers[currentQuestionIndex] = index;
            renderOptions();
            updateNavigationButtons();
        }

        function updateNavigationButtons() {
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerHTML = currentQuestionIndex === questions.length - 1 
                ? `Finish Quiz <span class="text-2xl">🏁</span>` 
                : `Next Question <span class="text-2xl">→</span>`;
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            selectedAnswers.forEach((selected, i) => {
                if (selected === null) skipped++;
                else if (selected === questions[i].answer) correct++;
                else incorrect++;
            });
            return { correct, incorrect, skipped, total: questions.length };
        }

        function showResults() {
            const { correct, incorrect, skipped, total } = calculateResults();
            const percentage = Math.round((correct / total) * 100);
            const attempted = correct + incorrect;
            const accuracyAttempted = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;

            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            document.getElementById('score').textContent = `${correct}/${total}`;
            document.getElementById('percentage').textContent = `${percentage}%`;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('skipped-count').textContent = skipped;

            const trophyEl = document.getElementById('trophy');
            trophyEl.textContent = percentage >= 85 ? '🏆' : percentage >= 65 ? '🔥' : percentage >= 40 ? '👍' : '📚';

            let insightsHTML = `You scored <strong>${correct}</strong> out of <strong>${total}</strong> (${percentage}% overall).<br><br>${attempted > 0 ? `Accuracy on attempted questions: <strong>${accuracyAttempted}%</strong>.<br><br>` : ''}${skipped > 0 ? `💡 You skipped <strong>${skipped}</strong> questions. Attempting them could have boosted your score significantly!` : `🌟 Outstanding! You attempted every question.`}`;
            document.getElementById('insights').innerHTML = insightsHTML;
        }

        function restartQuiz() {
            prepareShuffledQuestions();
            currentQuestionIndex = 0;
            document.getElementById('quiz-card').classList.remove('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('review-modal').classList.add('hidden');
            renderQuestion();
        }

        function shareResults() {
            const { correct, incorrect, skipped, total } = calculateResults();
            const percentage = Math.round((correct / total) * 100);
            const text = `🛡️ Quizzy Pro Result (Unit 2 Cybersecurity)\nI scored ${correct}/${total} (${percentage}%) — ${correct} correct, ${incorrect} wrong, ${skipped} skipped!\n\nBeat my score? Download the HTML file and play instantly!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const orig = btn.textContent;
                btn.textContent = '✅ Report Copied!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }

        function showAnswers() {
            const modal = document.getElementById('review-modal');
            const content = document.getElementById('review-content');
            content.innerHTML = '';
            questions.forEach((q, i) => {
                const selected = selectedAnswers[i];
                const isCorrect = selected === q.answer;
                let statusHTML = '';
                if (selected === null) {
                    statusHTML = `<div class="flex items-center gap-3 text-amber-600"><span class="text-3xl">⏭️</span><span class="font-semibold">Skipped</span></div>`;
                } else if (isCorrect) {
                    statusHTML = `<div class="flex items-center gap-3 text-emerald-600"><span class="text-3xl">✅</span><span class="font-semibold">Correct</span></div>`;
                } else {
                    statusHTML = `<div class="flex items-center gap-3 text-rose-600"><span class="text-3xl">❌</span><span class="font-semibold">Incorrect</span></div>`;
                }
                const div = document.createElement('div');
                div.className = `border rounded-3xl p-7 ${selected === null ? 'border-amber-200 bg-amber-50' : isCorrect ? 'border-emerald-200 bg-emerald-50' : 'border-rose-200 bg-rose-50'}`;
                div.innerHTML = `${statusHTML}<p class="font-medium mt-5 text-lg leading-tight">${q.question}</p><div class="grid grid-cols-1 gap-3 mt-7">${q.options.map((opt, idx) => { let optClass = 'px-6 py-4 rounded-2xl border text-base flex justify-between items-center'; if (idx === q.answer) optClass += ' border-emerald-400 bg-emerald-100 text-emerald-800'; else if (selected !== null && idx === selected) optClass += ' border-rose-400 bg-rose-100 text-rose-800 line-through'; else optClass += ' border-gray-200 bg-white'; return `<div class="${optClass}"><span>${String.fromCharCode(65 + idx)}. ${opt}</span>${idx === q.answer ? '<span class="text-emerald-600 text-xl">✓</span>' : ''}</div>`; }).join('')}</div>`;
                content.appendChild(div);
            });
            modal.classList.remove('hidden');
        }

        function hideReview() {
            document.getElementById('review-modal').classList.add('hidden');
        }

        function handleKeyboard(e) {
            if (document.getElementById('quiz-card').classList.contains('hidden')) return;
            if (e.key === 'ArrowRight') nextQuestion();
            if (e.key === 'ArrowLeft') previousQuestion();
            if (e.key >= '1' && e.key <= '4') {
                const idx = parseInt(e.key) - 1;
                if (idx < questions[currentQuestionIndex].options.length && selectedAnswers[currentQuestionIndex] === null) {
                    selectOption(idx);
                }
            }
        }

        function prepareShuffledQuestions() {
            questions = originalQuestions.map(q => {
                const shuffledOptions = shuffleArray(q.options);
                const originalCorrect = q.options[q.answer];
                const newAnswerIndex = shuffledOptions.indexOf(originalCorrect);
                return { question: q.question, options: shuffledOptions, answer: newAnswerIndex };
            });
            selectedAnswers = new Array(questions.length).fill(null);
        }

        function startQuiz() {
            prepareShuffledQuestions();
            currentQuestionIndex = 0;
            renderQuestion();
            document.addEventListener('keydown', handleKeyboard);
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
